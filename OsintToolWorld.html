<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WORLD SEARCH</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
body{
background:#050505;
color:white;
overflow:hidden;
}

/* ==== Background Logo ==== */
.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:420px;
font-weight:800;
color:rgba(255,255,255,0.02);
z-index:-2;
pointer-events:none;
animation:float 8s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translate(-50%,-50%) rotate(0deg);}
50%{transform:translate(-50%,-48%) rotate(2deg);}
}

/* ==== Smooth vignette ==== */
body:after{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.95));
z-index:-1;
}

/* ==== Particles ==== */
canvas{
position:fixed;
top:0;
left:0;
z-index:-3;
}

/* ==== Header ==== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 50px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(255,0,0,0.1);
transition:0.4s;
}

.logo{
font-size:20px;
letter-spacing:5px;
font-weight:700;
}

nav button{
background:none;
border:none;
color:white;
margin-left:30px;
font-size:14px;
letter-spacing:2px;
cursor:pointer;
position:relative;
transition:0.3s;
}

nav button:after{
content:"";
position:absolute;
left:0;
bottom:-5px;
width:0%;
height:2px;
background:#ff2a2a;
transition:0.3s;
}

nav button:hover:after{
width:100%;
}

/* ==== Sections ==== */
section{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
text-align:center;
padding:20px;
opacity:0;
transform:translateY(20px);
transition:0.6s ease;
}

section.active{
opacity:1;
transform:translateY(0);
}

/* ==== Hero ==== */
.hero{
font-size:60px;
font-weight:800;
line-height:1.2;
text-shadow:0 0 20px rgba(255,0,0,0.25);
animation:fadeIn 1.2s ease forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* ==== Search ==== */
.search-box{
margin-top:40px;
}

.search-box input{
padding:14px 20px;
width:280px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,0,0,0.2);
border-radius:8px;
color:white;
outline:none;
transition:0.3s;
}

.search-box input:focus{
border-color:#ff2a2a;
box-shadow:0 0 15px rgba(255,0,0,0.2);
}

.search-box button{
padding:14px 25px;
margin-left:10px;
background:#ff2a2a;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
transition:0.3s;
}

.search-box button:hover{
background:#ff0000;
box-shadow:0 0 20px rgba(255,0,0,0.4);
}

/* ==== Dossier ==== */
.dossier{
margin-top:40px;
width:90%;
max-width:600px;
background:rgba(255,255,255,0.04);
border:1px solid rgba(255,0,0,0.15);
border-radius:12px;
padding:25px;
backdrop-filter:blur(6px);
max-height:350px;
overflow-y:auto;
opacity:0;
transform:translateY(15px);
transition:0.5s ease;
}

.dossier.show{
opacity:1;
transform:translateY(0);
}

.dossier h3{
margin-bottom:15px;
color:#ff2a2a;
letter-spacing:2px;
}

.dossier table{
width:100%;
font-size:14px;
}

.dossier td{
padding:6px 0;
opacity:0.85;
}
</style>
</head>
<body>

<div class="bg-logo">E</div>
<canvas id="particles"></canvas>

<header>
<div class="logo">WORLD SEARCH</div>
<nav>
<button onclick="showHome()">Главная</button>
<button onclick="showSearch()">Поиск</button>
</nav>
</header>

<section id="home" class="active">
<div class="hero">
<div>Мы не ищем.</div>
<div>Мы находим.</div>
</div>
</section>

<section id="search">
<div class="search-box">
<input id="nick" placeholder="Введите ник">
<button onclick="scan()">Найти</button>
</div>

<div class="dossier" id="dossier">
<h3>ДОСЬЕ</h3>
<table id="results"></table>
</div>
</section>

<script>
function showHome(){
document.getElementById("home").classList.add("active");
document.getElementById("search").classList.remove("active");
}
function showSearch(){
document.getElementById("home").classList.remove("active");
document.getElementById("search").classList.add("active");
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function scan(){
let nick=document.getElementById("nick").value.trim();
if(!nick)return;

let table=document.getElementById("results");
table.innerHTML="";

let data=[
["Ник",nick],
["GitHub","github.com/"+nick],
["Репозитории",rand(0,120)],
["Подписчики",rand(0,5000)],
["Telegram","t.me/"+nick],
["Упоминания",rand(1,300)],
["Активность",rand(1,30)+" дней назад"]
];

data.forEach(row=>{
let tr=document.createElement("tr");
tr.innerHTML="<td>"+row[0]+"</td><td>"+row[1]+"</td>";
table.appendChild(tr);
});

document.getElementById("dossier").classList.add("show");
}

/* ==== Smooth Particles ==== */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
radius:Math.random()*2,
speedY:Math.random()*0.5+0.2
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="rgba(255,255,255,0.1)";
particles.forEach(p=>{
ctx.beginPath();
ctx.arc(p.x,p.y,p.radius,0,Math.PI*2);
ctx.fill();
p.y-=p.speedY;
if(p.y<0){
p.y=canvas.height;
p.x=Math.random()*canvas.width;
}
});
requestAnimationFrame(animate);
}
animate();
</script>

</body>
</html>
